services:
  - type: web
    name: mv-oxygen
    runtime: node
    buildCommand: ./render-build.sh
    startCommand: ./render-start.sh
    envVars:
      - key: APP_NAME
        value: MV_OXYGEN
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://mv-oxygen.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: mv-oxygen-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mv-oxygen-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mv-oxygen-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mv-oxygen-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mv-oxygen-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: MV_OXYGEN_TRADING

databases:
  - name: mv-oxygen-db
    databaseName: mv_oxygen_trading
    plan: free
